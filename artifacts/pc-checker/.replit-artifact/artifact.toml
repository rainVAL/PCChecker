kind = "mobile"
previewPath = "/"
title = "PC Compatibility Checker"
version = "1.0.0"
id = "artifacts/pc-checker"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
name = "expo"
paths = [ "/" ]
localPort = 25401

[services.development]
run = "pnpm --filter @workspace/pc-checker run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pc-checker", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/pc-checker", "run", "serve" ]

[services.env]
PORT = "25401"
BASE_PATH = "/"
